name: PR Agent Audit

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

jobs:
  agent-audit:
    name: Agent PR Audit
    if: startsWith(github.head_ref, 'agent/')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Fetch main for diff base
        run: git fetch origin main

      - name: Find spec for branch
        id: spec
        run: |
          BRANCH="${{ github.head_ref }}"
          SLUG="${BRANCH#agent/}"
          SPEC="spec_path=.agents/specs/active/${SLUG}.md"
          echo "$SPEC" >> "$GITHUB_OUTPUT"
          if [[ ! -f ".agents/specs/active/${SLUG}.md" ]]; then
            echo "spec_exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "spec_exists=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run changed files audit
        id: files_audit
        run: |
          set +e
          OUTPUT=$(python3 scripts/changed_files_against_spec.py "${{ github.head_ref }}" 2>&1)
          EXIT_CODE=$?
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          set -e

      - name: Run secrets scan on PR diff
        id: secrets_audit
        run: |
          set +e
          git diff --name-only origin/main...HEAD > /tmp/changed_files.txt
          OUTPUT=$(bash scripts/verify_no_secrets.sh --files $(cat /tmp/changed_files.txt | tr '\n' ' ') 2>&1)
          EXIT_CODE=$?
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          set -e

      - name: Comment audit result on PR
        uses: actions/github-script@v7
        with:
          script: |
            const specExists = '${{ steps.spec.outputs.spec_exists }}' === 'true';
            const specPath = '${{ steps.spec.outputs.spec_path }}';
            const filesExit = parseInt('${{ steps.files_audit.outputs.exit_code }}');
            const filesOutput = `${{ steps.files_audit.outputs.output }}`;
            const secretsExit = parseInt('${{ steps.secrets_audit.outputs.exit_code }}');
            const secretsOutput = `${{ steps.secrets_audit.outputs.output }}`;

            const pass = (ok) => ok ? '✅ PASS' : '❌ FAIL';
            const allPass = specExists && filesExit === 0 && secretsExit === 0;

            const body = [
              `## Agent PR Audit`,
              ``,
              `| Gate | Result |`,
              `|------|--------|`,
              `| Spec exists (\`${specPath}\`) | ${pass(specExists)} |`,
              `| Changed files within APPROVED_FILES | ${pass(filesExit === 0)} |`,
              `| No secrets in diff | ${pass(secretsExit === 0)} |`,
              ``,
              `### Files Audit`,
              `\`\`\``,
              filesOutput,
              `\`\`\``,
              ``,
              `### Secrets Scan`,
              `\`\`\``,
              secretsOutput,
              `\`\`\``,
              ``,
              allPass
                ? `**All gates passed. Ready for human review.**`
                : `**One or more gates failed. Fix the issues above before this PR can be merged.**`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            if (!allPass) {
              core.setFailed('Agent audit failed. See PR comment for details.');
            }
