name: PR Agent Audit

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

jobs:
  block-risky-changes:
    name: Block Risky File Changes
    if: startsWith(github.head_ref, 'agent/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: block risky file changes
        run: |
          CHANGED="$(git diff --name-only origin/${{ github.base_ref }}...HEAD)"
          echo "$CHANGED"
          ! echo "$CHANGED" | grep -qE '^(\.github/workflows/|infra/|docker/|\.env|secrets/)'

  pr-title:
    name: Enforce PR Title Format
    if: startsWith(github.head_ref, 'agent/')
    runs-on: ubuntu-latest
    steps:
      - name: check title matches [agent][<task-id>] summary
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$PR_TITLE" | grep -qE '^\[agent\]\[[^]]+\] .+'; then
            echo "PR title must match: [agent][<task-id>] summary"
            echo "Got: $PR_TITLE"
            exit 1
          fi

  agent-audit:
    name: Agent PR Audit
    if: startsWith(github.head_ref, 'agent/')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Fetch main for diff base
        run: git fetch origin main

      - name: Find spec for branch
        id: spec
        run: |
          BRANCH="${{ github.head_ref }}"
          SLUG="${BRANCH#agent/}"
          # Prefer date-prefixed spec (YYYY-MM-DD-<slug>.md), fall back to plain
          SPEC_PATH=$(find .agents/specs/active -maxdepth 1 -name "*-${SLUG}.md" 2>/dev/null | sort | tail -1 || true)
          [[ -z "$SPEC_PATH" && -f ".agents/specs/active/${SLUG}.md" ]] && SPEC_PATH=".agents/specs/active/${SLUG}.md"
          if [[ -n "$SPEC_PATH" ]]; then
            echo "spec_path=${SPEC_PATH}" >> "$GITHUB_OUTPUT"
            echo "spec_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "spec_path=.agents/specs/active/${SLUG}.md" >> "$GITHUB_OUTPUT"
            echo "spec_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run changed files audit
        id: files_audit
        run: |
          set +e
          OUTPUT=$(python3 scripts/changed_files_against_spec.py "${{ steps.spec.outputs.spec_path }}" 2>&1)
          EXIT_CODE=$?
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          set -e

      - name: Run secrets scan on PR diff
        id: secrets_audit
        run: |
          set +e
          git diff --name-only origin/main...HEAD > /tmp/changed_files.txt
          OUTPUT=$(bash scripts/verify_no_secrets.sh --files $(cat /tmp/changed_files.txt | tr '\n' ' ') 2>&1)
          EXIT_CODE=$?
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          set -e

      - name: Comment audit result on PR
        uses: actions/github-script@v7
        with:
          script: |
            const specExists = '${{ steps.spec.outputs.spec_exists }}' === 'true';
            const specPath = '${{ steps.spec.outputs.spec_path }}';
            const filesExit = parseInt('${{ steps.files_audit.outputs.exit_code }}');
            const filesOutput = `${{ steps.files_audit.outputs.output }}`;
            const secretsExit = parseInt('${{ steps.secrets_audit.outputs.exit_code }}');
            const secretsOutput = `${{ steps.secrets_audit.outputs.output }}`;

            const pass = (ok) => ok ? '✅ PASS' : '❌ FAIL';
            const allPass = specExists && filesExit === 0 && secretsExit === 0;

            const body = [
              `## Agent PR Audit`,
              ``,
              `| Gate | Result |`,
              `|------|--------|`,
              `| Spec exists (\`${specPath}\`) | ${pass(specExists)} |`,
              `| Changed files within APPROVED_FILES | ${pass(filesExit === 0)} |`,
              `| No secrets in diff | ${pass(secretsExit === 0)} |`,
              ``,
              `### Files Audit`,
              `\`\`\``,
              filesOutput,
              `\`\`\``,
              ``,
              `### Secrets Scan`,
              `\`\`\``,
              secretsOutput,
              `\`\`\``,
              ``,
              allPass
                ? `**All gates passed. Ready for human review.**`
                : `**One or more gates failed. Fix the issues above before this PR can be merged.**`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            if (!allPass) {
              core.setFailed('Agent audit failed. See PR comment for details.');
            }
