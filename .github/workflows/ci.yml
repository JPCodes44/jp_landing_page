name: ci

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup bun
        uses: oven-sh/setup-bun@v2

      - name: install
        run: bun install

      - name: lint
        run: bun lint

      - name: typecheck
        run: bun typecheck

      - name: test
        run: bun test

      - name: build
        run: bun run build
